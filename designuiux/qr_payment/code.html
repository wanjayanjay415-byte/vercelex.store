<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error-container": "#510017",
                    "inverse-surface": "#0b0f10",
                    "error": "#b41340",
                    "surface-tint": "#515c70",
                    "on-tertiary-fixed": "#001a29",
                    "secondary-container": "#dcc9ff",
                    "primary-dim": "#455064",
                    "tertiary": "#00628c",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#dcc9ff",
                    "inverse-primary": "#dae6fe",
                    "on-tertiary": "#e9f4ff",
                    "primary-container": "#dae6fe",
                    "outline-variant": "#abadaf",
                    "on-surface-variant": "#595c5e",
                    "primary-fixed-dim": "#ccd7ef",
                    "surface-bright": "#f5f7f9",
                    "tertiary-container": "#40bbff",
                    "on-surface": "#2c2f31",
                    "on-error": "#ffefef",
                    "tertiary-fixed": "#40bbff",
                    "surface-container-high": "#dfe3e6",
                    "surface-container": "#e5e9eb",
                    "primary-fixed": "#dae6fe",
                    "inverse-on-surface": "#9a9d9f",
                    "primary": "#515c70",
                    "on-secondary": "#f8f0ff",
                    "background": "#f5f7f9",
                    "on-secondary-container": "#5b00c7",
                    "on-background": "#2c2f31",
                    "surface-container-highest": "#d9dde0",
                    "secondary": "#702ae1",
                    "tertiary-dim": "#00557b",
                    "secondary-fixed-dim": "#d0b8ff",
                    "error-container": "#f74b6d",
                    "surface-dim": "#d0d5d8",
                    "secondary-dim": "#6411d5",
                    "on-primary-fixed": "#374155",
                    "on-primary": "#eff2ff",
                    "surface-variant": "#d9dde0",
                    "surface": "#f5f7f9",
                    "surface-container-low": "#eef1f3",
                    "on-primary-container": "#495468",
                    "outline": "#747779",
                    "error-dim": "#a70138",
                    "on-tertiary-fixed-variant": "#003d5a",
                    "on-primary-fixed-variant": "#535e72",
                    "on-tertiary-container": "#00344d",
                    "tertiary-fixed-dim": "#25adf1",
                    "on-secondary-fixed-variant": "#6514d6",
                    "on-secondary-fixed": "#430097"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        .cta-gradient {
            background: linear-gradient(135deg, #702ae1 0%, #6411d5 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#f5f7f9] dark:bg-[#0f172a] flex items-center px-4 h-16 w-full">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#eef1f3] transition-colors duration-300 active:scale-95">
<span class="material-symbols-outlined text-[#515c70]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-semibold text-lg text-[#515c70] dark:text-[#94a3b8]">Payment</h1>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 py-10 max-w-lg mx-auto w-full">
<!-- Amount Section -->
<div class="text-center mb-10">
<p class="font-label text-label-md text-on-surface-variant tracking-widest uppercase mb-2">Total Amount</p>
<h2 class="font-headline font-bold text-4xl text-on-surface tracking-tight">$1,240.00</h2>
<div class="mt-3 inline-flex items-center gap-2 px-3 py-1 bg-tertiary-container/20 text-on-tertiary-container rounded-full border border-tertiary/10">
<span class="material-symbols-outlined text-sm" data-icon="verified">verified</span>
<span class="font-label text-[10px] font-bold uppercase tracking-wider">Secure Transaction</span>
</div>
</div>
<!-- QR Content Bento/Glass Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-8 flex flex-col items-center relative overflow-hidden shadow-[0_-4px_40px_rgba(44,47,49,0.04)]">
<!-- Asymmetrical background accent -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-secondary/5 rounded-full blur-3xl"></div>
<!-- QR Code Container -->
<div class="relative group">
<div class="absolute -inset-2 bg-gradient-to-tr from-secondary/20 to-tertiary/20 rounded-xl blur opacity-75 group-hover:opacity-100 transition duration-300"></div>
<div class="relative bg-white p-4 rounded-xl border border-outline-variant/10">
<img alt="QR Code for Payment" class="w-60 h-60 object-contain" data-alt="A clean high-contrast black and white QR code centered on a crisp white square background with minimalist rounded edges" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDs0FDf07QSxv0wbubc_fsEEnPV30dHPFp46Oe2pRNLhbLuddBJ6bpZagM99HAPojffjFSxKwyTIgk3JIuby4RutHJ58u0raVp7k0s12mnglebBKam7_gv4c6HiBj8z1PNPFqG3UVK3JjrrjYpxVC99CyiNbe78oqqfhnX01wqbyKUmbc0RM8SfI24Rpxnk1GElGCU62ouY2wRidfjBlHrX0mw3XYq0qUrLvkWWKE9b_MXra_LrrXXQScdPGW6-GE3IiToE0WhmR-sa"/>
</div>
</div>
<!-- Instructions -->
<div class="mt-8 text-center space-y-2">
<p class="font-body text-body-lg text-on-surface font-medium">Scan to Pay via QRIS or Crypto</p>
<p class="font-body text-sm text-on-surface-variant max-w-[240px]">Open your banking app or crypto wallet and scan the code above.</p>
</div>
<!-- Countdown Timer -->
<div class="mt-8 flex items-center gap-2 text-error font-semibold font-body bg-error/5 px-4 py-2 rounded-full border border-error/10">
<span class="material-symbols-outlined text-[20px]" data-icon="timer">timer</span>
<span>Expiring in 14:59</span>
</div>
</div>
<!-- Action Buttons Section -->
<div class="w-full mt-10 space-y-4">
<button class="w-full cta-gradient text-white py-4 rounded-full font-headline font-bold text-lg shadow-xl shadow-secondary/20 hover:scale-[1.02] active:scale-95 transition-all duration-300">
                Check Payment Status
            </button>
<button class="w-full bg-surface-container-low text-primary py-4 rounded-full font-headline font-semibold text-lg hover:bg-surface-container-high transition-all duration-300 active:scale-95">
                Cancel Payment
            </button>
</div>
<!-- Trust Footer -->
<div class="mt-12 flex items-center justify-center gap-6 opacity-40 grayscale">
<span class="material-symbols-outlined text-4xl" data-icon="payments">payments</span>
<span class="material-symbols-outlined text-4xl" data-icon="currency_bitcoin">currency_bitcoin</span>
<span class="material-symbols-outlined text-4xl" data-icon="security">security</span>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused transactional screen, but included as shell placeholder if needed by logic) -->
<nav class="hidden md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-6 pt-3 bg-white/70 backdrop-blur-xl border-t border-[#abadaf]/15 shadow-[0_-4px_40px_rgba(44,47,49,0.06)] rounded-t-3xl">
<div class="flex flex-col items-center justify-center text-[#515c70] px-5 py-2">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-[#515c70] px-5 py-2">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider mt-1">History</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#702ae1] text-white rounded-2xl px-5 py-2">
<span class="material-symbols-outlined" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider mt-1">Wallet</span>
</div>
<div class="flex flex-col items-center justify-center text-[#515c70] px-5 py-2">
<span class="material-symbols-outlined" data-icon="contact_support">contact_support</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-wider mt-1">Support</span>
</div>
</nav>
<!-- Visual separation/Tonal shift between main content and footer areas -->
<div class="h-10 bg-gradient-to-t from-surface-container-low to-transparent w-full"></div>
</body></html>
